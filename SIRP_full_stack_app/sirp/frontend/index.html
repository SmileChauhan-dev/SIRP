<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SIRP — Smart Industry Readiness Platform</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700&family=IBM+Plex+Mono:wght@400;500;600&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
  :root{
    --graphite:#10141a;
    --panel:#161b22;
    --panel-raised:#1c222b;
    --line:#2a313c;
    --steel:#7e8a9a;
    --paper:#e9ecf1;
    --amber:#ff9f1c;
    --amber-dim:#7a5320;
    --signal-green:#3ddc97;
    --signal-red:#ff5d5d;
    --font-display:'Space Grotesk', sans-serif;
    --font-body:'Inter', sans-serif;
    --font-mono:'IBM Plex Mono', monospace;
    --radius:2px;
  }
  *{box-sizing:border-box; margin:0; padding:0;}
  html{scroll-behavior:smooth;}
  body{
    background:var(--graphite);
    color:var(--paper);
    font-family:var(--font-body);
    line-height:1.5;
    min-height:100vh;
    background-image:
      linear-gradient(var(--line) 1px, transparent 1px),
      linear-gradient(90deg, var(--line) 1px, transparent 1px);
    background-size:64px 64px;
    background-position:-1px -1px;
    background-attachment:fixed;
  }
  a{color:inherit;}
  .wrap{max-width:1240px; margin:0 auto; padding:0 28px;}

  /* ---------- TOP BAR ---------- */
  header.topbar{
    position:sticky; top:0; z-index:50;
    background:rgba(16,20,26,0.92);
    backdrop-filter:blur(8px);
    border-bottom:1px solid var(--line);
  }
  .topbar-inner{
    display:flex; align-items:center; justify-content:space-between;
    padding:14px 28px; max-width:1240px; margin:0 auto;
  }
  .brand{
    display:flex; align-items:center; gap:10px;
    font-family:var(--font-display); font-weight:700; font-size:18px; letter-spacing:0.02em;
  }
  .brand .mark{
    width:30px; height:30px; border:1.5px solid var(--amber); border-radius:50%;
    display:flex; align-items:center; justify-content:center; position:relative;
  }
  .brand .mark::before{
    content:""; width:8px; height:8px; background:var(--amber); border-radius:50%;
  }
  .brand .sub{font-family:var(--font-mono); font-size:10px; color:var(--steel); font-weight:400; display:block; letter-spacing:0.08em;}
  .nav-tabs{display:flex; gap:4px; background:var(--panel); border:1px solid var(--line); border-radius:99px; padding:4px;}
  .nav-tabs button{
    font-family:var(--font-mono); font-size:12px; letter-spacing:0.03em;
    color:var(--steel); background:none; border:none; padding:8px 16px; border-radius:99px;
    cursor:pointer; transition:all 0.15s ease;
  }
  .nav-tabs button.active{background:var(--amber); color:#1a1300; font-weight:600;}
  .nav-tabs button:not(.active):hover{color:var(--paper);}
  .session-pill{
    font-family:var(--font-mono); font-size:11px; color:var(--steel);
    display:flex; align-items:center; gap:8px;
  }
  .session-pill .dot{width:6px;height:6px;border-radius:50%; background:var(--signal-green); box-shadow:0 0 6px var(--signal-green);}
  .session-pill button{
    background:none; border:1px solid var(--line); color:var(--steel); font-family:var(--font-mono);
    font-size:11px; padding:5px 10px; border-radius:99px; cursor:pointer;
  }
  .session-pill button:hover{border-color:var(--amber); color:var(--amber);}

  @media (max-width: 880px){
    .topbar-inner{flex-direction:column; gap:12px; align-items:stretch;}
    .nav-tabs{overflow-x:auto;}
  }

  /* ---------- HERO ---------- */
  .hero{padding:64px 0 48px; position:relative;}
  .hero-grid{display:grid; grid-template-columns:1.2fr 0.8fr; gap:48px; align-items:center;}
  @media (max-width: 880px){.hero-grid{grid-template-columns:1fr;}}
  .eyebrow{
    font-family:var(--font-mono); font-size:11px; letter-spacing:0.12em; text-transform:uppercase;
    color:var(--amber); display:flex; align-items:center; gap:10px; margin-bottom:18px;
  }
  .eyebrow .line{width:24px; height:1px; background:var(--amber);}
  h1.hero-title{
    font-family:var(--font-display); font-size:clamp(34px, 4.4vw, 56px); font-weight:700;
    line-height:1.05; letter-spacing:-0.01em; margin-bottom:20px;
  }
  h1.hero-title em{color:var(--amber); font-style:normal;}
  .hero-desc{color:var(--steel); font-size:16px; max-width:520px; margin-bottom:28px;}
  .stakeholder-row{display:flex; gap:10px; flex-wrap:wrap; margin-bottom:32px;}
  .stake-chip{
    font-family:var(--font-mono); font-size:11px; border:1px solid var(--line); padding:7px 12px;
    border-radius:99px; color:var(--paper); background:var(--panel);
  }
  .cta-row{display:flex; gap:14px; flex-wrap:wrap;}
  .btn{
    font-family:var(--font-mono); font-size:13px; font-weight:600; letter-spacing:0.02em;
    padding:13px 24px; border-radius:2px; cursor:pointer; border:1px solid transparent;
    transition:all 0.15s ease; display:inline-flex; align-items:center; gap:8px;
  }
  .btn-primary{background:var(--amber); color:#1a1300;}
  .btn-primary:hover{background:#ffb444;}
  .btn-ghost{background:transparent; border:1px solid var(--line); color:var(--paper);}
  .btn-ghost:hover{border-color:var(--amber); color:var(--amber);}

  /* Gauge signature element */
  .gauge-card{
    background:var(--panel); border:1px solid var(--line); border-radius:4px; padding:28px;
    position:relative;
  }
  .gauge-card .label{font-family:var(--font-mono); font-size:11px; color:var(--steel); letter-spacing:0.08em; text-transform:uppercase; margin-bottom:18px;}
  .gauge-wrap{display:flex; flex-direction:column; align-items:center;}
  .gauge-score{font-family:var(--font-display); font-size:42px; font-weight:700; margin-top:8px;}
  .gauge-status{font-family:var(--font-mono); font-size:12px; color:var(--amber); letter-spacing:0.04em; margin-top:4px;}
  .gauge-footnote{font-family:var(--font-mono); font-size:11px; color:var(--steel); margin-top:18px; border-top:1px solid var(--line); padding-top:14px; line-height:1.6;}

  /* ---------- SECTION SHELL ---------- */
  section{padding:56px 0;}
  .section-head{display:flex; align-items:baseline; justify-content:space-between; gap:20px; margin-bottom:28px; flex-wrap:wrap;}
  .section-title{font-family:var(--font-display); font-size:26px; font-weight:600;}
  .section-tag{font-family:var(--font-mono); font-size:11px; color:var(--steel); letter-spacing:0.06em;}

  .panel{
    background:var(--panel); border:1px solid var(--line); border-radius:4px; padding:28px;
  }
  .panel-raised{background:var(--panel-raised);}

  /* ---------- AUTH VIEW ---------- */
  .auth-shell{max-width:460px; margin:80px auto;}
  .role-grid{display:grid; grid-template-columns:1fr 1fr; gap:10px; margin:18px 0 24px;}
  .role-card{
    border:1px solid var(--line); border-radius:3px; padding:14px; cursor:pointer; text-align:left;
    background:var(--panel-raised); transition:all 0.15s ease;
  }
  .role-card.selected{border-color:var(--amber); background:rgba(255,159,28,0.08);}
  .role-card .rc-title{font-family:var(--font-display); font-size:14px; font-weight:600;}
  .role-card .rc-desc{font-family:var(--font-mono); font-size:10px; color:var(--steel); margin-top:4px;}

  label.field-label{font-family:var(--font-mono); font-size:11px; color:var(--steel); letter-spacing:0.05em; text-transform:uppercase; display:block; margin-bottom:6px;}
  input[type=text], input[type=email], textarea, select{
    width:100%; background:var(--graphite); border:1px solid var(--line); color:var(--paper);
    padding:11px 12px; border-radius:2px; font-family:var(--font-body); font-size:14px; margin-bottom:16px;
  }
  input:focus, textarea:focus, select:focus{outline:none; border-color:var(--amber);}
  .form-error{font-family:var(--font-mono); font-size:12px; color:var(--signal-red); margin:-6px 0 14px;}
  .form-note{font-family:var(--font-mono); font-size:11px; color:var(--steel); margin-top:10px; text-align:center;}
  .form-note button{background:none; border:none; color:var(--amber); cursor:pointer; font-family:var(--font-mono); font-size:11px; text-decoration:underline;}

  /* ---------- DROPZONE ---------- */
  .dropzone{
    border:1.5px dashed var(--line); border-radius:4px; padding:40px 20px; text-align:center;
    cursor:pointer; transition:all 0.15s ease; margin-bottom:18px;
  }
  .dropzone.drag{border-color:var(--amber); background:rgba(255,159,28,0.05);}
  .dropzone .dz-icon{font-family:var(--font-mono); font-size:28px; color:var(--amber); margin-bottom:10px;}
  .dropzone .dz-title{font-weight:600; margin-bottom:4px;}
  .dropzone .dz-sub{font-family:var(--font-mono); font-size:11px; color:var(--steel);}
  .file-chip{
    display:inline-flex; align-items:center; gap:10px; background:var(--graphite); border:1px solid var(--amber);
    padding:8px 14px; border-radius:99px; font-family:var(--font-mono); font-size:12px; margin-bottom:18px;
  }
  .file-chip button{background:none; border:none; color:var(--steel); cursor:pointer; font-size:14px;}

  /* tab toggle for upload vs paste */
  .mini-toggle{display:flex; gap:0; border:1px solid var(--line); border-radius:99px; width:fit-content; margin-bottom:18px; overflow:hidden;}
  .mini-toggle button{font-family:var(--font-mono); font-size:11px; padding:7px 16px; background:none; border:none; color:var(--steel); cursor:pointer;}
  .mini-toggle button.active{background:var(--line); color:var(--paper);}

  /* ---------- RESULTS ---------- */
  .results-grid{display:grid; grid-template-columns:1fr 1.4fr; gap:24px; margin-top:28px;}
  @media (max-width:880px){.results-grid{grid-template-columns:1fr;}}

  .score-ring-wrap{display:flex; flex-direction:column; align-items:center; padding:20px 0 8px;}
  .score-number{font-family:var(--font-display); font-size:48px; font-weight:700;}
  .score-role{font-family:var(--font-mono); font-size:12px; color:var(--steel); text-align:center; margin-top:10px; line-height:1.5;}
  .level-badge{
    font-family:var(--font-mono); font-size:11px; padding:5px 12px; border-radius:99px; margin-top:14px; letter-spacing:0.03em;
  }

  .skill-row{display:flex; align-items:center; justify-content:space-between; padding:10px 0; border-bottom:1px solid var(--line); gap:12px;}
  .skill-row:last-child{border-bottom:none;}
  .skill-name{font-size:14px;}
  .pill{font-family:var(--font-mono); font-size:10px; padding:3px 9px; border-radius:99px; letter-spacing:0.03em; white-space:nowrap;}
  .pill-have{background:rgba(61,220,151,0.12); color:var(--signal-green); border:1px solid rgba(61,220,151,0.3);}
  .pill-missing-high{background:rgba(255,93,93,0.12); color:var(--signal-red); border:1px solid rgba(255,93,93,0.3);}
  .pill-missing-med{background:rgba(255,159,28,0.12); color:var(--amber); border:1px solid rgba(255,159,28,0.3);}
  .pill-missing-low{background:rgba(126,138,154,0.15); color:var(--steel); border:1px solid var(--line);}

  .course-card{
    display:flex; justify-content:space-between; align-items:flex-start; gap:16px;
    padding:14px 0; border-bottom:1px solid var(--line);
  }
  .course-card:last-child{border-bottom:none;}
  .course-skill{font-family:var(--font-display); font-weight:600; font-size:14px; margin-bottom:4px;}
  .course-name{font-family:var(--font-mono); font-size:11.5px; color:var(--steel); line-height:1.5;}

  /* ---------- DASHBOARD ---------- */
  .stat-grid{display:grid; grid-template-columns:repeat(4,1fr); gap:16px; margin-bottom:28px;}
  @media (max-width:880px){.stat-grid{grid-template-columns:1fr 1fr;}}
  .stat-card{background:var(--panel); border:1px solid var(--line); border-radius:4px; padding:20px;}
  .stat-card .stat-label{font-family:var(--font-mono); font-size:10px; color:var(--steel); letter-spacing:0.06em; text-transform:uppercase; margin-bottom:8px;}
  .stat-card .stat-value{font-family:var(--font-display); font-size:30px; font-weight:700;}
  .bar-row{display:flex; align-items:center; gap:12px; margin-bottom:12px;}
  .bar-label{font-family:var(--font-mono); font-size:11.5px; width:200px; flex-shrink:0; color:var(--paper);}
  .bar-track{flex:1; height:8px; background:var(--graphite); border-radius:99px; overflow:hidden; border:1px solid var(--line);}
  .bar-fill{height:100%; background:var(--amber); border-radius:99px;}
  .bar-count{font-family:var(--font-mono); font-size:11px; color:var(--steel); width:30px; text-align:right;}

  table.data-table{width:100%; border-collapse:collapse; font-size:13px;}
  table.data-table th{
    text-align:left; font-family:var(--font-mono); font-size:10px; color:var(--steel); text-transform:uppercase;
    letter-spacing:0.05em; padding:10px 12px; border-bottom:1px solid var(--line);
  }
  table.data-table td{padding:12px 12px; border-bottom:1px solid var(--line);}
  table.data-table tr:last-child td{border-bottom:none;}

  /* ---------- INDUSTRY / JOB POSTINGS ---------- */
  .job-card{background:var(--panel); border:1px solid var(--line); border-radius:4px; padding:20px; margin-bottom:14px;}
  .job-top{display:flex; justify-content:space-between; align-items:flex-start; gap:16px; flex-wrap:wrap;}
  .job-title{font-family:var(--font-display); font-weight:600; font-size:16px;}
  .job-org{font-family:var(--font-mono); font-size:11px; color:var(--amber); margin-top:4px;}
  .job-skills{display:flex; gap:6px; flex-wrap:wrap; margin-top:12px;}
  .job-skill-chip{font-family:var(--font-mono); font-size:10.5px; background:var(--graphite); border:1px solid var(--line); padding:4px 10px; border-radius:99px;}
  .job-actions{display:flex; gap:10px; margin-top:14px;}
  .link-btn{font-family:var(--font-mono); font-size:11px; color:var(--amber); background:none; border:none; cursor:pointer; text-decoration:underline; padding:0;}

  .empty-state{text-align:center; padding:48px 20px; color:var(--steel);}
  .empty-state .es-title{font-family:var(--font-display); font-size:18px; color:var(--paper); margin-bottom:8px;}
  .empty-state .es-sub{font-family:var(--font-mono); font-size:12px;}

  .toast{
    position:fixed; bottom:24px; right:24px; background:var(--panel-raised); border:1px solid var(--amber);
    padding:14px 18px; border-radius:3px; font-family:var(--font-mono); font-size:12px; z-index:200;
    max-width:320px; box-shadow:0 8px 30px rgba(0,0,0,0.4);
  }
  .toast.error{border-color:var(--signal-red); color:var(--signal-red);}

  .spinner{
    width:16px; height:16px; border:2px solid rgba(255,255,255,0.2); border-top-color:#1a1300;
    border-radius:50%; animation:spin 0.7s linear infinite; display:inline-block;
  }
  @keyframes spin{to{transform:rotate(360deg);}}

  footer{border-top:1px solid var(--line); padding:32px 0; margin-top:40px;}
  .footer-row{display:flex; justify-content:space-between; align-items:center; flex-wrap:wrap; gap:12px;}
  .footer-row .fl{font-family:var(--font-mono); font-size:11px; color:var(--steel);}
  .sdg-badge{
    display:inline-flex; align-items:center; gap:8px; font-family:var(--font-mono); font-size:11px;
    border:1px solid var(--line); padding:6px 12px; border-radius:99px; color:var(--steel);
  }
  .sdg-badge .num{background:var(--amber); color:#1a1300; font-weight:700; width:18px; height:18px; border-radius:3px; display:flex; align-items:center; justify-content:center; font-size:10px;}

  .hidden{display:none !important;}

  .priority-legend{display:flex; gap:14px; margin-bottom:16px; flex-wrap:wrap;}
  .priority-legend span{font-family:var(--font-mono); font-size:10.5px; color:var(--steel); display:flex; align-items:center; gap:6px;}
  .priority-legend .dot{width:7px; height:7px; border-radius:50%;}
</style>
</head>
<body>

<header class="topbar">
  <div class="topbar-inner">
    <div class="brand">
      <span class="mark"></span>
      <span>SIRP<span class="sub">SMART INDUSTRY READINESS PLATFORM</span></span>
    </div>
    <nav class="nav-tabs" id="navTabs"></nav>
    <div class="session-pill" id="sessionPill"></div>
  </div>
</header>

<main id="app"></main>

<footer>
  <div class="wrap footer-row">
    <span class="fl">© 2026 SIRP — built for Industry 4.0 / SDG 9 readiness</span>
    <span class="sdg-badge"><span class="num">9</span> Industry, Innovation &amp; Infrastructure</span>
  </div>
</footer>

<div id="toastHost"></div>

<script src="config.js"></script>
<script src="api.js"></script>
<script src="app.js"></script>
</body>
</html>
